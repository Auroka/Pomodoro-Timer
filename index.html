<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>番茄时钟</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
      max-width: 450px;
      width: 100%;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
      color: #333;
      margin-bottom: 30px;
    }

    .timer-display {
      font-size: 96px;
      font-weight: bold;
      color: #667eea;
      margin: 30px 0;
      font-variant-numeric: tabular-nums;
    }

    .status {
      font-size: 20px;
      color: #666;
      margin-bottom: 20px;
    }

    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 30px;
    }

    .btn {
      padding: 14px 32px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .btn:active {
      transform: translateY(0);
    }

    .mode-selector {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .mode-btn {
      padding: 10px 20px;
      border: 2px solid #e0e0e0;
      background: white;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .mode-btn.active {
      border-color: #667eea;
      background: #667eea;
      color: white;
    }

    .mode-btn:hover {
      border-color: #667eea;
    }

    .stats {
      border-top: 1px solid #e0e0e0;
      padding-top: 20px;
      display: flex;
      justify-content: space-around;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: #667eea;
    }

    .stat-label {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }

    /* 响应式设计 */
    @media (max-width: 480px) {
      .container {
        padding: 30px 20px;
      }

      .timer-display {
        font-size: 64px;
      }

      .buttons {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">🍅 番茄时钟</div>

    <div class="mode-selector">
      <button class="mode-btn active" data-mode="focus">专注</button>
      <button class="mode-btn" data-mode="short">短休息</button>
      <button class="mode-btn" data-mode="long">长休息</button>
    </div>

    <div class="status" id="status">准备开始专注</div>
    <div class="timer-display" id="timer">25:00</div>

    <div class="buttons">
      <button class="btn btn-primary" id="startBtn">开始</button>
      <button class="btn btn-secondary" id="resetBtn">重置</button>
    </div>

    <div class="stats">
      <div class="stat-item">
        <div class="stat-value" id="completedCount">0</div>
        <div class="stat-label">完成番茄</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="totalMinutes">0</div>
        <div class="stat-label">专注分钟</div>
      </div>
    </div>
  </div>

  <script>
    // 配置
    const MODES = {
      focus: { time: 25 * 60, label: '专注时间' },
      short: { time: 5 * 60, label: '短休息' },
      long: { time: 15 * 60, label: '长休息' }
    };

    // 状态
    let currentTime = MODES.focus.time;
    let isRunning = false;
    let timerId = null;
    let currentMode = 'focus';
    let completedPomodoros = 0;
    let totalFocusMinutes = 0;

    // 元素
    const timerDisplay = document.getElementById('timer');
    const statusDisplay = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const modeBtns = document.querySelectorAll('.mode-btn');
    const completedCountEl = document.getElementById('completedCount');
    const totalMinutesEl = document.getElementById('totalMinutes');

    // 格式化时间
    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    // 更新显示
    function updateDisplay() {
      timerDisplay.textContent = formatTime(currentTime);
      document.title = `${formatTime(currentTime)} - 番茄时钟`;
    }

    // 开始/暂停
    function toggleTimer() {
      if (isRunning) {
        pauseTimer();
      } else {
        startTimer();
      }
    }

    // 开始
    function startTimer() {
      if (isRunning) return;
      
      isRunning = true;
      startBtn.textContent = '暂停';
      statusDisplay.textContent = `正在${MODES[currentMode].label}`;
      
      timerId = setInterval(() => {
        currentTime--;
        updateDisplay();

        if (currentTime <= 0) {
          completeTimer();
        }
      }, 1000);
    }

    // 暂停
    function pauseTimer() {
      isRunning = false;
      startBtn.textContent = '继续';
      statusDisplay.textContent = '已暂停';
      clearInterval(timerId);
    }

    // 完成
    function completeTimer() {
      clearInterval(timerId);
      isRunning = false;
      
      // 播放提示音
      playNotification();
      
      if (currentMode === 'focus') {
        completedPomodoros++;
        totalFocusMinutes += MODES.focus.time / 60;
        completedCountEl.textContent = completedPomodoros;
        totalMinutesEl.textContent = totalFocusMinutes;
        
        // 自动建议休息
        if (completedPomodoros % 4 === 0) {
          alert('🎉 完成 4 个番茄！休息一下吧！');
          switchMode('long');
        } else {
          alert('🎉 完成一个番茄！休息一下吧！');
          switchMode('short');
        }
      } else {
        alert('⏰ 休息时间结束！准备开始下一个番茄！');
        switchMode('focus');
      }
      
      startBtn.textContent = '开始';
      statusDisplay.textContent = '完成！';
    }

    // 播放提示音
    function playNotification() {
      // 使用浏览器通知
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification('番茄时钟', {
          body: currentMode === 'focus' ? '完成一个番茄！' : '休息结束！',
          icon: '🍅'
        });
      }
      
      // 简单的蜂鸣声（如果浏览器支持）
      try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        oscillator.frequency.value = 800;
        oscillator.connect(audioContext.destination);
        oscillator.start();
        setTimeout(() => oscillator.stop(), 200);
      } catch (e) {
        // 忽略音频错误
      }
    }

    // 重置
    function resetTimer() {
      pauseTimer();
      currentTime = MODES[currentMode].time;
      startBtn.textContent = '开始';
      statusDisplay.textContent = '准备开始';
      updateDisplay();
    }

    // 切换模式
    function switchMode(mode) {
      currentMode = mode;
      currentTime = MODES[mode].time;
      
      modeBtns.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
      });
      
      updateDisplay();
      statusDisplay.textContent = `准备${MODES[mode].label}`;
    }

    // 事件监听
    startBtn.addEventListener('click', toggleTimer);
    resetBtn.addEventListener('click', resetTimer);

    modeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const mode = btn.dataset.mode;
        pauseTimer();
        switchMode(mode);
        startBtn.textContent = '开始';
      });
    });

    // 请求通知权限
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }

    // 初始化
    updateDisplay();
  </script>
</body>
</html>
